name: Build HRRR Tiles

on:
  workflow_dispatch:

jobs:
  build-tiles:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install GDAL and system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin python3-gdal libgdal-dev
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify installation
        run: |
          python --version
          gdal2tiles.py --version
          gdal_translate --version
          python -c "import pygrib; print(f'pygrib: {pygrib.__version__}')"
      
      - name: Run pipeline (forecast hour 0, with upload)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          DATE=$(date -u +%Y%m%d)
          RUN_HOUR=00
          FORECAST_HOUR=0
          
          echo "=== Pipeline: $DATE ${RUN_HOUR}Z fh${FORECAST_HOUR} ==="
          python fetch_and_tile.py $DATE $RUN_HOUR $FORECAST_HOUR --upload
      
      - name: Summarize output
        run: |
          echo "Files produced:"
          ls -lh *.grib2 *.tif 2>/dev/null || echo "(no files at root)"
          echo ""
          echo "Tile count:"
          find tiles -name "*.png" | wc -l
          echo ""
          echo "Folder sizes:"
          du -sh tiles/ 2>/dev/null || echo "(no tiles folder)"
